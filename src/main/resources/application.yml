spring:
  application:
    name: taller-app

  profiles:
    active: prod

  main:
    web-application-type: none   # porque es JavaFX, no web

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

logging:
  level:
    org.springframework: INFO



